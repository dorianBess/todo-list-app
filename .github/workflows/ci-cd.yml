name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# NOTE AWS Academy : Terraform est exécuté MANUELLEMENT en local (credentials temporaires ~4h).
# La CI/CD gère uniquement : tests → build image → déploiement via SSH sur l'EC2.
# Aucun appel à l'API AWS n'est fait ici, donc pas de credentials AWS nécessaires.

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Run tests
        run: yarn test

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-list-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-list-app:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          # Le script tourne directement sur l'EC2 — pas d'appel AWS API.
          # L'image est tirée depuis Docker Hub (pas ECR) pour éviter d'avoir besoin
          # des credentials AWS dans la pipeline.
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/todo-list-app:latest
            docker stop todo-app 2>/dev/null || true
            docker rm todo-app 2>/dev/null || true
            docker run -d \
              --name todo-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e MYSQL_HOST=${{ secrets.MYSQL_HOST }} \
              -e MYSQL_USER=${{ secrets.MYSQL_USER }} \
              -e MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }} \
              -e MYSQL_DB=todos \
              ${{ secrets.DOCKERHUB_USERNAME }}/todo-list-app:latest
